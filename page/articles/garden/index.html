    <link rel="stylesheet" href="../../assets/css/article.css">
    <title>做梦想做的事</title>
    <link rel="icon" href="../../../assets/icon/avatar.jpg" type="image/x-icon">
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="../../">返回首页</a></li>
                <li><a href="../../articles/about/index.html">关于</a></li>
            </ul>
        </div>
    </nav>
    <div id="login" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
        <input type="password" id="password" placeholder="请输入密码" style="padding:12px;font-size:18px;border:3px solid #ddd;border-radius:5px;">
        <button onclick="checkPassword()" style="padding:12px 24px;background:#8d4bbb;color:#fff;border:3px;border-radius:5px;margin:9px;">立即验证</button>
    </div>
    <div id="app" style="display:none;"></div>
</body>

<script>
    window.$recipage = {
        url: 'garden.md',
        github: 'https://github.com/yunliyo',
        footer: {
            title: '做梦想做的事',
            logo: '../../../assets/icon/avatar.jpg'
        },
        callback: function () {
            hljs.initHighlightingOnLoad();
        }
    }

    const PASSWORD_HASH = '8387b14414f9016a786a1a9a50a988efd17174f0b99057aee6996150a23fb915';
    async function checkPassword() {
        const input = document.getElementById('password').value;
        const encoder = new TextEncoder();
        const data = encoder.encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        if(hashHex === PASSWORD_HASH) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            window.$recipage.url = 'about.md';
        } else {
            alert('请正确输入密码！');
        }
    }
</script>
